name: Bug report
description: Something isn't working right
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can — it helps a lot.

  - type: input
    id: version
    attributes:
      label: OnekoMac+ version
      description: Found in the settings panel (top-right corner)
      placeholder: "e.g. 1.1.0"
    validations:
      required: true

  - type: dropdown
    id: macos
    attributes:
      label: macOS version
      options:
        - macOS 15 Sequoia
        - macOS 14 Sonoma
        - macOS 13 Ventura
    validations:
      required: true

  - type: dropdown
    id: mac
    attributes:
      label: Mac hardware
      options:
        - MacBook Pro (Apple Silicon)
        - MacBook Air (Apple Silicon)
        - Mac mini / Studio / Pro (Apple Silicon)
        - MacBook Pro (Intel)
        - MacBook Air (Intel)
        - iMac / Mac Pro (Intel)
        - Other

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the app
        2. Open settings
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop images/GIFs here if relevant.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Number of screens, specific skin used, anything else that seems relevant.
